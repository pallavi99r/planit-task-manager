<!DOCTYPE html>
<html>
<head>
<title>Todo App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    background: linear-gradient(135deg,#89f7fe,#66a6ff);
    min-height:100vh;
}

.todo-card{
    border-radius:15px;
}

.task-done{
    text-decoration: line-through;
    color: gray;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="card todo-card shadow-lg p-4">

<h2 class="text-center mb-4">
<i class="fa-solid fa-list-check"></i> My Todo List
</h2>

<form action="/add" method="post" class="d-flex gap-2 mb-3">

<input type="text" name="task" class="form-control" placeholder="Enter new task">

<button class="btn btn-success">
<i class="fa-solid fa-plus"></i> Add
</button>

</form>

<ul class="list-group">

{% for task in tasks %}

<li class="list-group-item d-flex justify-content-between align-items-center">

<div>

{% if task['completed'] == 1 %}

<span class="task-done">{{ task['task'] }}</span>

{% else %}

{{ task['task'] }}

<a href="/complete/{{ task['id'] }}" class="btn btn-success btn-sm ms-2">
<i class="fa-solid fa-check"></i>
</a>

{% endif %}

</div>

<div>

<a href="/edit/{{ task['id'] }}" class="btn btn-warning btn-sm">
<i class="fa-solid fa-pen"></i>
</a>

<a href="/delete/{{ task['id'] }}" class="btn btn-danger btn-sm">
<i class="fa-solid fa-trash"></i>
</a>

</div>

</li>

{% endfor %}

</ul>

</div>

</div>

</body>
</html>
